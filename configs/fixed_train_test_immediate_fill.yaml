project:
  seed: 42
  environment: urban
  horizon_minutes: 10

data:
  root: ../../data/stock_data
  tabular_artifact: processed/baseline_tabular_immediate_fill_10m_tp5_sl3_price_v2.parquet
  selected_feature_schema: processed/reduced_walk_forward_multiclass_ev_v2_feature_schema.json
  labels_artifact: processed/labels_immediate_fill_dual_path_10m_tp5_sl3_v1.parquet
  train_sessions:
    - session_2026-07-07
    - session_2026-07-08
    - session_2026-07-09
    - session_2026-07-10
    - session_2026-07-13
    - session_2026-07-14
    - session_2026-07-15
  test_sessions:
    - session_2026-07-16
    - session_2026-07-17
  test_is_pristine: false

execution:
  entry_mode: immediate_market_proxy_at_close
  fill_probability: 1.0

walk_forward:
  sampling_method: ten_minute_bucket
  bucket_minutes: 10
  equal_session_weights: true
  scaler_clip: 20.0

model:
  classes: [TP, SL, TIMEOUT]
  hidden_dims: [32]
  dropout: 0.20
  batch_size: 512
  learning_rate: 0.0005
  weight_decay: 0.001
  fixed_epochs: 15
  temperature: 1.0

expected_value:
  price_tier_boundary: 1.0
  minimum_tier_outcome_samples: 30
  tier_payoff_shrinkage_samples: 100

decision:
  method: train_score_quantile_without_outcome_tuning
  train_score_quantile: 0.99
  minimum_predicted_expected_return: 0.0

backtest:
  initial_capital_usd: 10000.0
  order_notional_usd: 1000.0
  max_concurrent_positions: 5
  order_ttl_minutes: 1
  max_holding_minutes: 10

artifacts:
  version: fixed_train_test_immediate_fill_multiclass_ev_v4
