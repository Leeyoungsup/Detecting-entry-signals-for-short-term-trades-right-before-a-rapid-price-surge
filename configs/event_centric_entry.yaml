project:
  seed: 42
  environment: urban

data:
  root: ../../data/stock_data
  feature_rows_artifact: processed/feature_rows_price_v2.parquet
  sequence_index_artifact: processed/sequence_index_price_v2.parquet
  train_sessions:
    - session_2026-07-07
    - session_2026-07-08
    - session_2026-07-09
    - session_2026-07-10
    - session_2026-07-13
    - session_2026-07-14
    - session_2026-07-15
  test_sessions:
    - session_2026-07-16
    - session_2026-07-17
  test_is_pristine: false

label:
  version: all_candle_last_ask_to_last_bid_multihorizon_v1
  entry_quote: last_ask
  future_quote: last_bid
  require_consecutive_minutes: true
  require_valid_quotes: true
  targets:
    - name: up_1pct_1m
      horizon_minutes: 1
      target_return: 0.01
    - name: up_2pct_2m
      horizon_minutes: 2
      target_return: 0.02
    - name: up_3pct_3m
      horizon_minutes: 3
      target_return: 0.03
  primary_target: up_3pct_3m

features:
  sequence_length: 10
  sequence:
    - log_return_1
    - body_return
    - range_return
    - upper_wick
    - lower_wick
    - close_location
    - gap_from_prev_close
    - body_to_range_ratio
    - distance_from_high_5
    - distance_from_low_5
    - rolling_std_return_3
    - atr_pct_5
  context:
    - log_return_3
    - log_return_5
    - log_return_10
    - log_return_20
    - close_to_sma5
    - close_to_sma10
    - close_to_sma20
    - close_to_sma60
    - rolling_std_return_5
    - rolling_std_return_10
    - rolling_std_return_20
    - rolling_std_return_60
    - atr_pct_5
    - atr_pct_14
    - distance_from_high_10
    - distance_from_high_20
    - distance_from_high_60
    - distance_from_low_10
    - distance_from_low_20
    - distance_from_low_60
    - range_position_10
    - range_position_20
    - range_position_60
    - is_bearish
  scaler_clip: 12.0

sampling:
  regular_negative_spacing_minutes: 3
  hard_negative_min_return: 0.015
  event_cluster_minutes: 3
  equal_session_weights: true
  max_positive_class_weight: 5.0

model:
  conv_channels: 24
  context_hidden: 16
  joint_hidden: 32
  dropout: 0.20
  batch_size: 512
  learning_rate: 0.0005
  weight_decay: 0.001
  candidate_epochs: [8, 12, 16, 20]
  minimum_oof_prior_sessions: 3
  auxiliary_regression_weight: 0.05
  regression_scale: 100.0
  regression_clip_min: -10.0
  regression_clip_max: 15.0

decision:
  method: oof_score_top_5pct
  oof_score_quantile: 0.95

artifacts:
  version: event_centric_multihorizon_entry_v7
